<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Context Diagram: Angular UI Tenant Access</title>
  <desc id="desc">SVG preview of the multi-tenant SaaS reference architecture context diagram.</desc>
  <defs>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 8; }
      .aws { fill: #fff7ed; stroke: #f97316; }
      .auth { fill: #fdf2f8; stroke: #db2777; }
      .edge { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .label { font: 13px Arial, sans-serif; fill: #334155; }
      .node { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .boundary { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; rx: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1100" height="760" fill="#ffffff"/>
  <text x="40" y="44" class="title">Context Diagram: Angular UI Tenant Access</text>

  <rect x="500" y="90" width="540" height="590" class="boundary"/>
  <text x="520" y="120" class="node">AWS Cloud: Multi-tenant Agentic AI SaaS Reference Architecture</text>

  <rect x="40" y="160" width="150" height="64" class="box"/>
  <text x="78" y="187" class="node">End User</text>
  <text x="62" y="206" class="small">Tenant browser</text>

  <rect x="260" y="150" width="190" height="74" class="box aws"/>
  <text x="286" y="179" class="node">CloudFront</text>
  <text x="285" y="199" class="small">HTTPS distribution</text>

  <rect x="260" y="285" width="190" height="74" class="box aws"/>
  <text x="305" y="314" class="node">Route 53</text>
  <text x="285" y="334" class="small">Alias / CNAME records</text>

  <rect x="535" y="155" width="190" height="78" class="box aws"/>
  <text x="578" y="184" class="node">Amazon S3</text>
  <text x="560" y="204" class="small">Angular static website</text>

  <rect x="800" y="145" width="190" height="78" class="box auth"/>
  <text x="835" y="174" class="node">Amazon Cognito</text>
  <text x="842" y="194" class="small">User Pool</text>

  <rect x="800" y="255" width="190" height="78" class="box auth"/>
  <text x="818" y="284" class="node">Verified Permissions</text>
  <text x="835" y="304" class="small">Cedar action auth</text>

  <rect x="535" y="285" width="190" height="78" class="box aws"/>
  <text x="574" y="314" class="node">API Gateway</text>
  <text x="560" y="334" class="small">REST / WebSocket APIs</text>

  <rect x="800" y="385" width="190" height="78" class="box aws"/>
  <text x="850" y="414" class="node">Lambda</text>
  <text x="825" y="434" class="small">Python / TypeScript</text>

  <rect x="535" y="405" width="190" height="78" class="box aws"/>
  <text x="565" y="434" class="node">Bedrock Agent</text>
  <text x="565" y="454" class="small">Agentic processing</text>

  <rect x="535" y="525" width="190" height="78" class="box aws"/>
  <text x="557" y="554" class="node">Knowledge Base</text>
  <text x="570" y="574" class="small">Long-term memory</text>

  <rect x="800" y="525" width="190" height="78" class="box aws"/>
  <text x="850" y="554" class="node">S3 Vector</text>
  <text x="840" y="574" class="small">Memory index</text>

  <path d="M190 192 H260" class="edge"/>
  <text x="198" y="180" class="label">Angular UI access</text>
  <path d="M450 187 H535" class="edge"/>
  <text x="463" y="175" class="label">Origin</text>
  <path d="M725 185 H800" class="edge"/>
  <text x="735" y="173" class="label">Authenticate</text>
  <path d="M725 215 C760 230 760 270 800 292" class="edge"/>
  <text x="720" y="252" class="label">Authorize actions</text>
  <path d="M630 233 V285" class="edge"/>
  <text x="642" y="262" class="label">Backend requests</text>
  <path d="M725 324 H800 V385" class="edge"/>
  <text x="742" y="352" class="label">Invoke logic</text>
  <path d="M800 424 H725" class="edge"/>
  <text x="735" y="414" class="label">Agent flow</text>
  <path d="M630 483 V525" class="edge"/>
  <text x="642" y="510" class="label">Uses KB</text>
  <path d="M725 564 H800" class="edge"/>
  <text x="740" y="552" class="label">Backed by</text>
  <path d="M355 285 V224" class="edge"/>
  <text x="368" y="258" class="label">CloudFront DNS</text>
</svg>
